# HS-Panel Configuration File
# /usr/local/hspanel/config/hspanel.conf
# Generated by HS-Panel Installer
# Modify with caution — restart hspanel-api after changes.

[panel]
version = 1.0.0
panel_root = /usr/local/hspanel
var_root = /var/hspanel
log_dir = /usr/local/hspanel/logs
panel_user = hspanel
panel_group = hspanel

[network]
# Perl HTTP daemon (legacy UI)
daemon_port = 2086
daemon_bind = 0.0.0.0
# Python FastAPI backend
api_port = 2083
api_bind = 127.0.0.1
# WebSocket / live metrics
ws_port  = 2087

[ssl]
# Panel's own HTTPS certificate (auto-provisioned by certbot)
panel_ssl_cert = /usr/local/hspanel/config/ssl/panel.crt
panel_ssl_key  = /usr/local/hspanel/config/ssl/panel.key
force_https = false

[security]
# Random 64-byte hex — regenerated at install time
secret_key = REPLACE_WITH_GENERATED_SECRET
session_lifetime = 3600
bcrypt_rounds = 12
csrf_enabled = true
brute_force_limit = 10
brute_force_window = 900

[license]
license_key_file = /usr/local/hspanel/config/license.key
license_server_url = https://license.hostingsignal.com
offline_grace_days = 7

[webserver]
engine = openlitespeed
ols_root = /usr/local/lsws
ols_bin  = /usr/local/lsws/bin/lswsctrl
ols_conf = /usr/local/lsws/conf
vhost_conf_dir = /usr/local/lsws/conf/vhosts
ols_webadmin_port = 7080
php_default = lsphp83

[database]
engine = mariadb
host = 127.0.0.1
port = 3306
panel_db = hspanel
panel_db_user = hspanel
# Panel DB password — set at install time
panel_db_pass = REPLACE_WITH_DB_PASSWORD
socket = /var/run/mysqld/mysqld.sock

[mail]
mta = postfix
imap = dovecot
postfix_conf = /etc/postfix
dovecot_conf = /etc/dovecot
webmail = rainloop
webmail_path = /usr/local/hspanel/software/webmail
virtual_domains_file = /etc/postfix/virtual_domains
virtual_mailbox_file  = /etc/postfix/virtual_mailboxes
virtual_passwd_file   = /etc/dovecot/users

[dns]
engine = powerdns
pdns_conf = /etc/powerdns/pdns.conf
pdns_api_url = http://127.0.0.1:8053
pdns_api_key = REPLACE_WITH_PDNS_API_KEY
default_ttl = 300
default_ns1 = ns1.yourdomain.com
default_ns2 = ns2.yourdomain.com

[ftp]
engine = pure-ftpd
conf_dir = /etc/pure-ftpd
passwd_file = /etc/pure-ftpd/pureftpd.passwd

[security_tools]
csf_conf = /etc/csf/csf.conf
csf_ignore = /etc/csf/csf.ignore
modsec_conf = /etc/modsecurity/modsecurity.conf
owasp_crs = /etc/modsecurity/crs/crs-setup.conf
imunifyav_bin = /opt/isec/ld/stand/imunifyav

[php]
versions_dir = /usr/local/lsws
available_versions = lsphp74,lsphp80,lsphp81,lsphp82,lsphp83
default_version = lsphp83

[ssl_provider]
certbot_bin = /usr/bin/certbot
webroot_path = /var/www/letsencrypt
acme_email = admin@yourdomain.com
auto_renew = true

[docker]
socket = /var/run/docker.sock
enabled = true

[backup]
backup_dir = /var/hspanel/backups
retention_days = 30
compress = true

[logging]
level = info
access_log = /usr/local/hspanel/logs/access.log
error_log  = /usr/local/hspanel/logs/error.log
api_log    = /usr/local/hspanel/logs/api.log
max_size_mb = 50
rotate_count = 7
