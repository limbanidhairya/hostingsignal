<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HS-Panel Partner Portal Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d9ff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2023",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(15, 32, 35, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 217, 255, 0.2);
        }
        .grid-bg {
            background-image: linear-gradient(rgba(0, 217, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 217, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .glow-shadow {
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Grid Effect -->
<div class="absolute inset-0 grid-bg pointer-events-none"></div>
<div class="absolute inset-0 bg-gradient-to-b from-background-dark/50 via-transparent to-background-dark pointer-events-none"></div>
<!-- Main Container -->
<div class="relative flex h-full w-full max-w-[480px] flex-col px-6 py-8 z-10">
<!-- Header / Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="bg-primary/10 p-4 rounded-xl border border-primary/30 mb-4 glow-shadow">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 0, 'wght' 300;">
                    shield_lock
                </span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-2">
                HS-PANEL <span class="text-primary font-light">PARTNER</span>
</h1>
<p class="text-slate-400 mt-2 text-sm uppercase tracking-[0.2em]">Developer Portal Access</p>
</div>
<!-- Glass Login Card -->
<div class="glass-panel rounded-xl p-8 shadow-2xl">
<h2 class="text-xl font-semibold mb-6 text-white text-center">Login to your account</h2>
<form class="space-y-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">
                            mail
                        </span>
<input class="w-full bg-background-dark/50 border border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg py-4 pl-12 pr-4 text-white placeholder:text-slate-600 transition-all outline-none" placeholder="partner@hs-panel.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-300 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">
                            lock
                        </span>
<input class="w-full bg-background-dark/50 border border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg py-4 pl-12 pr-12 text-white placeholder:text-slate-600 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between text-xs py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded border-slate-700 bg-background-dark text-primary focus:ring-primary/50" type="checkbox"/>
<span class="text-slate-400 group-hover:text-slate-200 transition-colors">Remember device</span>
</label>
<a class="text-primary hover:text-primary/80 transition-colors font-medium" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-primary to-blue-600 hover:from-primary/90 hover:to-blue-600/90 text-background-dark font-bold py-4 rounded-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]" type="submit">
<span>Login to Partner Portal</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Actions -->
<div class="mt-8 text-center space-y-4">
<p class="text-slate-400 text-sm">
                New developer? 
                <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="#">Apply for access</a>
</p>
<div class="pt-6 flex justify-center gap-6">
<a class="text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined">help_outline</span>
</a>
<a class="text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined">language</span>
</a>
<a class="text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined">terminal</span>
</a>
</div>
</div>
<!-- Infrastructure Status Mockup Image -->
<div class="mt-auto pt-10 px-4">
<div class="flex items-center justify-between p-4 bg-background-dark/30 rounded-lg border border-slate-800/50">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
<span class="text-[10px] uppercase tracking-widest text-slate-500">API Status: Operational</span>
</div>
<div class="h-[20px] w-32 bg-slate-800/50 rounded overflow-hidden">
<div class="h-full w-4/5 bg-primary/20 border-r border-primary/50"></div>
</div>
</div>
</div>
</div>
<!-- Decorative background element -->
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -top-24 -right-24 w-96 h-96 bg-blue-600/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
