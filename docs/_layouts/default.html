<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <div class="shell">
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}">
          <img src="https://raw.githubusercontent.com/limbanidhairya/hostingsignal/main/developer-panel/web/public/branding/hostingsignal-logo.png" alt="HostingSignal" width="42" height="42">
          <span>
            <strong>HostingSignal Docs</strong>
            <small>docs.hostingsignal.in</small>
          </span>
        </a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/admin_reference/' | relative_url }}">Admin</a>
          <a href="{{ '/local_services_installer/' | relative_url }}">Install</a>
          <a href="{{ '/release_scope_2026-03-15/' | relative_url }}">Release</a>
        </nav>
      </header>
      <main class="content">
        {{ content }}
      </main>
      <footer class="site-footer">
        <span>HostingSignal documentation</span>
        <span>Release v1.0.0</span>
      </footer>
    </div>
  </body>
</html>
